name: Android Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Restore release configuration
        env:
          TAPTAP_CLIENT_TOKEN: ${{ secrets.TAPTAP_CLIENT_TOKEN }}
          PRIVACY_POLICY_URL: ${{ secrets.PRIVACY_POLICY_URL }}
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          required=(
            TAPTAP_CLIENT_TOKEN
            PRIVACY_POLICY_URL
            ANDROID_RELEASE_KEYSTORE_BASE64
            ANDROID_RELEASE_STORE_PASSWORD
            ANDROID_RELEASE_KEY_ALIAS
            ANDROID_RELEASE_KEY_PASSWORD
          )
          for name in "${required[@]}"; do
            test -n "${!name:-}" || { echo "Missing required secret: $name" >&2; exit 1; }
          done
          mkdir -p keystore
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > keystore/daming-release.p12
          chmod 600 keystore/daming-release.p12
          cat > local.properties <<EOF
          TAPTAP_CLIENT_TOKEN=$TAPTAP_CLIENT_TOKEN
          PRIVACY_POLICY_URL=$PRIVACY_POLICY_URL
          RELEASE_STORE_FILE=keystore/daming-release.p12
          RELEASE_STORE_PASSWORD=$ANDROID_RELEASE_STORE_PASSWORD
          RELEASE_KEY_ALIAS=$ANDROID_RELEASE_KEY_ALIAS
          RELEASE_KEY_PASSWORD=$ANDROID_RELEASE_KEY_PASSWORD
          EOF

      - name: Test and build signed release APK
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: gradle :app:testDebugUnitTest :app:assembleRelease --no-daemon --stacktrace -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8

      - name: Verify runtime provider classes
        run: |
          set -euo pipefail
          apk="app/build/outputs/apk/release/app-release.apk"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          unzip -q "$apk" 'classes*.dex' -d "$tmp_dir"
          build_tools="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          "$build_tools/dexdump" -f "$tmp_dir"/classes*.dex > "$tmp_dir/dexdump.txt"
          python3 - "$tmp_dir/dexdump.txt" <<'PY'
          import re
          import sys

          expected = {
              "Lcom/bytedance/sdk/openadsdk/TTFileProvider;": "Landroidx/core/content/FileProvider;",
              "Lcom/qq/e/comm/GDTFileProvider;": "Landroid/content/ContentProvider;",
              "Lcom/sigmob/sdk/SigmobFileV4Provider;": "Landroidx/core/content/FileProvider;",
          }
          dump = open(sys.argv[1], encoding="utf-8").read()
          definitions = dict(re.findall(
              r"Class descriptor\s+: '([^']+)'\n"
              r"\s+Access flags\s+:.*?\n"
              r"\s+Superclass\s+: '([^']+)'",
              dump,
          ))
          errors = []
          for provider, expected_superclass in expected.items():
              actual_superclass = definitions.get(provider)
              if actual_superclass is None:
                  errors.append(f"Missing runtime provider class definition: {provider}")
              elif actual_superclass != expected_superclass:
                  errors.append(
                      f"Invalid superclass for {provider}: "
                      f"expected {expected_superclass}, got {actual_superclass}"
                  )
          if errors:
              raise SystemExit("\n".join(errors))
          for provider in expected:
              print(f"Verified loadable provider: {provider}")
          PY

      - name: Verify release signature
        run: |
          set -euo pipefail
          apk="app/build/outputs/apk/release/app-release.apk"
          test -f "$apk"
          "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner" verify --verbose --print-certs "$apk"

      - name: Prepare release files
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          tag="android-${short_sha}"
          apk="app/build/outputs/apk/release/app-release.apk"
          out="daming-fushengzhi3-release-${tag}.apk"
          test -f "$apk"
          cp "$apk" "$out"
          {
            echo "tag=$tag"
            echo "apk=$out"
            echo "title=大明浮生志3 Android Release ${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release delete "${{ steps.prep.outputs.tag }}" --yes --cleanup-tag || true
          gh release create "${{ steps.prep.outputs.tag }}" \
            "${{ steps.prep.outputs.apk }}" \
            --title "${{ steps.prep.outputs.title }}" \
            --notes "Signed Android release APK for commit ${GITHUB_SHA}."
